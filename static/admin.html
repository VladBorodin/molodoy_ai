<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Админка - Молодой AI</title>
	<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
	<div class="app admin-app">
		<header class="app-header admin-header">
			<div>
				<p class="app-kicker">Панель администратора</p>
				<h1>Дневник Молодого</h1>
				<p class="app-subtitle">
					Добавляй, редактируй и удаляй записи базы знаний. Backend сам сохранит текст и пересоберёт чанки.
				</p>
			</div>

			<nav class="admin-nav">
				<a href="/">Чат</a>
				<a href="/docs" target="_blank">Swagger</a>
				<button id="logoutButton" type="button" class="admin-nav-button">
					Выйти
				</button>
			</nav>
		</header>

		<main class="admin-layout">
			<section class="admin-card">
				<div class="admin-card-header">
					<div>
						<p class="app-kicker">Редактор записи</p>
						<h2 id="formTitle">Новая запись</h2>
					</div>

					<button id="newEntryButton" type="button" class="secondary-button">
						Новая запись
					</button>
				</div>

				<form id="entryForm" class="admin-form">
					<div class="form-group">
						<label for="entryTitle">Название записи</label>
						<input
							id="entryTitle"
							type="text"
							placeholder="Например: Появление Молодого"
							autocomplete="off"
							required
						>
					</div>

					<div class="form-group">
						<label for="entryContent">Текст записи</label>
						<textarea
							id="entryContent"
							rows="14"
							placeholder="Например: Осенью 2019 года у нас появился кот Молодой..."
							required
						></textarea>
					</div>

					<label class="checkbox-row">
						<input id="entryIsActive" type="checkbox" checked>
						<span>Запись активна и участвует в поиске</span>
					</label>

					<div class="admin-actions">
						<button id="saveButton" type="submit">
							Сохранить запись
						</button>

						<button id="clearButton" type="button" class="secondary-button">
							Очистить
						</button>
					</div>
				</form>
			</section>

			<aside class="admin-side">
				<section class="admin-card admin-result-card">
					<h2>Результат</h2>

					<p id="adminStatusText" class="admin-status-text">
						Админка готова к работе.
					</p>

					<div id="adminResult" class="admin-result is-hidden">
						<div class="result-row">
							<span>ID записи</span>
							<strong id="resultEntryId">-</strong>
						</div>

						<div class="result-row">
							<span>Создано чанков</span>
							<strong id="resultChunksCount">-</strong>
						</div>
					</div>
				</section>

				<section class="admin-card entries-card">
					<div class="entries-header">
						<div>
							<p class="app-kicker">База знаний</p>
							<h2>Записи</h2>
						</div>

						<button id="reloadEntriesButton" type="button" class="secondary-button">
							Обновить
						</button>
					</div>

					<div id="entriesList" class="entries-list">
						<p class="empty-list-text">Загружаю записи...</p>
					</div>
				</section>
			</aside>
		</main>
	</div>

	<script src="/static/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Молодой AI</title>
	<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
	<div class="app">
		<header class="app-header">
			<div class="kicker-row">
				<p class="app-kicker">Локальный кото-ИИ</p>

				<button
					id="adminLoginButton"
					class="secret-admin-button"
					type="button"
					title="Вход администратора"
				>
					🐾
				</button>

				<a
					id="adminPanelLink"
					class="admin-panel-link is-hidden"
					href="/static/admin.html"
				>
					Админка
				</a>

				<button
					id="adminLogoutButton"
					class="admin-logout-button is-hidden"
					type="button"
				>
					Выйти
				</button>
			</div>
			<h1>How do you do, fellow kitts?</h1>
			<p class="app-subtitle">
				Задай вопрос о коте Молодом, а система найдет ответ в дневниковых записях.
			</p>
		</header>

		<main class="chat-layout">
			<section class="cat-section" aria-label="Кот Молодой">
				<img
                    id="catImage"
                    class="cat-image"
                    src="/static/assets/cat_idle.png"
                    alt="Кот Молодой со скейтом"
                >
			</section>

			<section class="chat-section" aria-label="Чат">
				<div class="answer-card">
					<div class="answer-label">Ответ ИИ</div>
					<p id="answerText" class="answer-text">
						Привет. Я Молодой. Спрашивай, человек.
					</p>
				</div>

				<form id="questionForm" class="question-form">
					<label class="question-label" for="questionInput">
						Вопрос пользователя
					</label>

					<div class="question-row">
						<input
							id="questionInput"
							class="question-input"
							type="text"
							placeholder="Например: когда появился Молодой?"
							autocomplete="off"
						>

						<button class="question-button" type="submit">
							Спросить
						</button>
					</div>
				</form>

				<p id="statusText" class="status-text">
					Молодой ждёт вопрос.
				</p>
			</section>
		</main>
	</div>

	<div id="adminLoginModal" class="modal-overlay is-hidden">
		<div class="login-modal">
			<div class="login-modal-header">
				<div>
					<p class="app-kicker">Вход администратора</p>
					<h2>Панель Молодого</h2>
				</div>

				<button id="adminLoginCloseButton" class="modal-close-button" type="button">
					×
				</button>
			</div>

			<form id="adminLoginForm" class="login-form">
				<label for="adminUsername">Логин</label>
				<input
					id="adminUsername"
					type="text"
					autocomplete="username"
					placeholder="admin"
					required
				>

				<label for="adminPassword">Пароль</label>
				<input
					id="adminPassword"
					type="password"
					autocomplete="current-password"
					placeholder="password"
					required
				>

				<p id="adminLoginError" class="login-error is-hidden">
					Неверный логин или пароль.
				</p>

				<button type="submit">
					Войти
				</button>
			</form>
		</div>
	</div>

	<script src="/static/script.js"></script>
</body>
</html>
